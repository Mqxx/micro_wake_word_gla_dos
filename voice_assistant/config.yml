esphome:
  name: 'voice_assistant'
  friendly_name: 'Voice Assistant'
  comment: 'A local voice assistant'
  project:
    name: "mqxx.voice_assistant"
    version: "0.1.0"

  environment_variables: {}
  
  on_boot: {}

  on_shutdown: {}

  on_loop: {}

esp32:
  variant: esp32s3

psram:
  mode: octal
  speed: 80MHz

wifi:
  power_save_mode: none
  ssid: !secret wifi_ssid
  password: !secret wifi_password
